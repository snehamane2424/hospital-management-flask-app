{% extends 'base.html' %}

{% block content %}

<h2>Book Appointment</h2>

<form method="POST">

Patient

<select name="patient">

{% for p in patients %}
<option value="{{p.id}}">{{p.name}}</option>
{% endfor %}

</select>

Doctor

<select name="doctor">

{% for d in doctors %}
<option value="{{d.id}}">{{d.name}}</option>
{% endfor %}

</select>

Date

<input type="date" name="date">

<button type="submit">Book</button>

</form>

{% endblock %}
